{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Sign Up - HomeCare{% endblock %}

{% block content %}
<section class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card p-4 shadow-lg border-0">
                    <h2 class="text-center mb-4">Join as a {{ user_type|title }}</h2>
                    <form method="post">
                        {% csrf_token %}
                        {{ form|crispy }}
                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-primary btn-lg">Sign Up</button>
                        </div>
                    </form>
                    <p class="text-center mt-3">Already have an account? <a href="{% url 'accounts:login' %}">Login</a></p>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
